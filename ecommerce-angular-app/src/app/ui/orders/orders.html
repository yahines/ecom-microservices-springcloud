<div class="p-3">
  <div class="card">
    <div class="card-header">Orders</div>
    <div class="card-body">
      <h2>Orders</h2>
      <table class="table">
        <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>State</th>
          <th>Products Count</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let order of orders()">
          <td>{{order.id}}</td>
          <td>{{order.date}}</td>
          <td>{{order.state}}</td>
          <td>{{order.productItems.length}}</td>
          <td>
            <button class="btn btn-success" (click)="getOrderDetails(order)">Order Details</button>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
