server:
  port: 8888

spring:
  application:
    name: gateway-service
  cloud:
    config:
      enabled: false
    discovery:
      enabled: true
    gateway:
       discovery:
        locator:
          lower-case-service-id: true
#      routes:
#        - id: r1
#          uri: lb://CUSTOMER-SERVICE
#          predicates:
#            - Path=/api/customers/**
#        - id: r2
#          uri: lb://INVENTORY-SERVICE
#          predicates:
#            - Path=/api/products/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
#    enabled: false
#    register-with-eureka: false
#    fetch-registry: false
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.servlet.function: DEBUG

