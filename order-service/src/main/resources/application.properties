spring.application.name=order-service
server.port=8084
# spring.config.import=optional:configserver:http://localhost:9999

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:orders-db

spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8090/realms/nesrine-dev-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8090/realms/nesrine-dev-realm/protocol/openid-connect/certs

springdoc.swagger-ui.enabled=true